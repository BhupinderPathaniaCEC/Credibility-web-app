name: Deploy after CI

on:
  workflow_run:
    workflows: [".NET Core CI"]
    types: [completed]

jobs:
  deploy:
    # Only run if CI was successful and it happened on the main branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to remote server via SSH
        if: ${{ secrets.DEPLOY_HOST && secrets.DEPLOY_USER && secrets.DEPLOY_SSH_KEY && secrets.DEPLOY_PATH }}
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Update source code
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi
            
            # Restart containers and rebuild image on the server
            docker compose -f deploy/docker-compose.yml up -d --build

      - name: Skip remote deploy warning
        if: ${{ !secrets.DEPLOY_HOST || !secrets.DEPLOY_USER || !secrets.DEPLOY_SSH_KEY || !secrets.DEPLOY_PATH }}
        run: |
          echo "Deployment skipped: Missing required secrets (HOST, USER, KEY, or PATH)."