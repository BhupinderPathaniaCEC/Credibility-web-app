name: .NET Core CI

# 1. When should this run? 
# It runs every time you push to the 'main' branch or open a Pull Request.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    # 2. What OS should the server run? (Ubuntu matches your WSL environment perfectly)
    runs-on: ubuntu-latest

    steps:
    # 3. Pulls your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Installs the .NET 10 SDK on the GitHub server
    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 5. Restores all your NuGet packages
    - name: Restore dependencies
      run: dotnet restore

    # 6. Builds the Application and Test projects
    - name: Build Project
      run: dotnet build

    # 7. THE MAGIC: Runs your Unit and Integration tests!
    - name: Run Tests
      run: dotnet test 



