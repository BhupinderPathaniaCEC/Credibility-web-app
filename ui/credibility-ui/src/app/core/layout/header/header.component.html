<header class="navbar">
  <div class="brand">
    <a routerLink="/">Credibility Index</a>
  </div>

  <nav class="nav-links">
    <a routerLink="/home">Home</a>
    <a routerLink="/about">About</a>

    @if (isLoggedIn) {
      
      @if (isAdminUser) {
        <a routerLink="/admin" class="admin-link">⚙️ Admin Dashboard</a>
      }

      <a routerLink="/profile">My Profile</a>
      <button class="logout-btn" (click)="logout()">Logout</button>

    } @else {

      <button type="button" class="login-btn" (click)="login()">Login</button>
      <a routerLink="/auth/register" class="register-btn">Register</a>

    }
  </nav>
</header>
