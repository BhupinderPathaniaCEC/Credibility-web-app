<div class="auth-container">
  <div class="auth-card">
    <h2>Register</h2>
    
    <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Email:</label>
        <input type="email" formControlName="email" placeholder="name@example.com">
        <span class="error-text" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          Please enter a valid email address.
        </span>
      </div>

      <div class="form-group">
        <label>Display name:</label>
        <input type="text" formControlName="displayName" placeholder="e.g. Varun">
        <span class="error-text" *ngIf="registerForm.get('displayName')?.touched && registerForm.get('displayName')?.invalid">
          Display name must be at least 3 characters.
        </span>
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" formControlName="password" placeholder="At least 6 characters">
      </div>

      <div class="form-group">
        <label>Confirm:</label>
        <input type="password" formControlName="confirmPassword" placeholder="Repeat password">
        <span class="error-text" *ngIf="registerForm.get('confirmPassword')?.hasError('mismatch')">
          Passwords do not match.
        </span>
      </div>

      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Creating account...' : 'Create account' }}
      </button>
      
    </form>
    
    <div class="footer-link">
      Already have an account? <a routerLink="/auth/login">Log in</a>
    </div>
  </div>
</div>
